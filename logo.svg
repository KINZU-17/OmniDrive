<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#131921"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#febd69"/>
      <stop offset="100%" style="stop-color:#ff9f3b"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#febd69"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#febd69"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="120" rx="15" fill="url(#bgGrad)"/>
  
  <!-- Car Icon (simplified sports car silhouette) -->
  <g transform="translate(30, 35)" filter="url(#glow)">
    <!-- Car body -->
    <path d="M0,40 L10,25 L40,20 L80,20 L110,25 L140,25 L150,40 L150,55 L140,60 L10,60 L0,55 Z" 
          fill="url(#carGrad)" opacity="0.95"/>
    <!-- Windows -->
    <path d="M45,25 L75,22 L105,25 L105,35 L45,35 Z" fill="#131921" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="30" cy="60" r="12" fill="#febd69" stroke="#131921" stroke-width="3"/>
    <circle cx="30" cy="60" r="5" fill="#131921"/>
    <circle cx="120" cy="60" r="12" fill="#febd69" stroke="#131921" stroke-width="3"/>
    <circle cx="120" cy="60" r="5" fill="#131921"/>
    <!-- Speed lines -->
    <line x1="155" y1="35" x2="175" y2="35" stroke="#febd69" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="160" y1="45" x2="180" y2="45" stroke="#febd69" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- OmniDrive Text -->
  <text x="200" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#textGrad)">OmniDrive</text>
  
  <!-- Tagline -->
  <text x="200" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#febd69" opacity="0.8">Connecting you to the drive of your choice</text>
  
  <!-- .co.ke -->
  <text x="200" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.6">.co.ke</text>
  
  <!-- Globe/World icon -->
  <g transform="translate(350, 35)" opacity="0.6">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#febd69" stroke-width="2"/>
    <ellipse cx="20" cy="20" rx="18" ry="8" fill="none" stroke="#febd69" stroke-width="1.5"/>
    <line x1="2" y1="20" x2="38" y2="20" stroke="#febd69" stroke-width="1.5"/>
    <line x1="20" y1="2" x2="20" y2="38" stroke="#febd69" stroke-width="1.5"/>
  </g>
</svg>

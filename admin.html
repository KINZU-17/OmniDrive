<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniDrive Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

        .login-screen {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; flex-direction: column; gap: 16px;
        }
        .login-screen h2 { color: #e47911; font-size: 1.8rem; }
        .login-screen p  { color: #888; font-size: 0.9rem; }
        .login-screen input {
            padding: 12px 16px; border-radius: 8px; border: 1px solid #333;
            background: #1a1d27; color: #fff; font-size: 1rem; width: 300px;
        }
        .login-screen button {
            padding: 12px 32px; background: #e47911; color: #fff;
            border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 300px;
        }

        /* User type tabs */
        .type-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 12px 0; }
        .type-tab-btn {
            padding: 10px 20px; border-radius: 8px; border: 1px solid #333;
            background: #1a1d27; color: #666; cursor: pointer; font-size: 0.9rem;
            transition: all 0.3s;
        }
        .type-tab-btn:hover { border-color: #e47911; color: #e47911; }
        .type-tab-btn.active { background: #e47911; color: #fff; border-color: #e47911; }

        .selected-display { color: #e47911; font-size: 0.85rem; margin-top: 8px; }

        header {
            background: #1a1d27; padding: 16px 32px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #2a2d3a;
        }
        header h1 { color: #e47911; font-size: 1.4rem; }
        header span { font-size: 0.85rem; color: #888; }
        .logout-btn {
            background: #333; color: #fff; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-size: 0.85rem;
        }

        .dashboard { padding: 24px 32px; }

        /* Stats Cards */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px; margin-bottom: 32px;
        }
        .stat-card {
            background: #1a1d27; border-radius: 10px; padding: 20px;
            border: 1px solid #2a2d3a; text-align: center;
        }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: #e47911; }
        .stat-card .label { font-size: 0.8rem; color: #888; margin-top: 4px; text-transform: uppercase; }
        .stat-card.green .value { color: #4caf50; }
        .stat-card.red   .value { color: #f44336; }
        .stat-card.blue  .value { color: #2196f3; }

        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn {
            padding: 10px 20px; border-radius: 8px; border: 1px solid #2a2d3a;
            background: #1a1d27; color: #888; cursor: pointer; font-size: 0.9rem;
        }
        .tab-btn.active { background: #e47911; color: #fff; border-color: #e47911; }

        /* Table */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        th {
            background: #1a1d27; padding: 12px 14px; text-align: left;
            color: #888; font-weight: 600; border-bottom: 1px solid #2a2d3a;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px;
        }
        td { padding: 12px 14px; border-bottom: 1px solid #1e2130; vertical-align: middle; }
        tr:hover td { background: #1e2130; }

        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 0.75rem; font-weight: bold; text-transform: uppercase;
        }
        .badge-paid    { background: #1b5e20; color: #69f0ae; }
        .badge-pending { background: #e65100; color: #ffcc80; }
        .badge-failed  { background: #b71c1c; color: #ff8a80; }

        .refresh-btn {
            background: #1a1d27; color: #e47911; border: 1px solid #e47911;
            padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            margin-left: auto; display: block; margin-bottom: 16px;
        }
        .refresh-btn:hover { background: #e47911; color: #fff; }

        .empty { text-align: center; padding: 40px; color: #555; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
    <h2>🚗 OmniDrive Admin</h2>
    <p>WHO IS ENTERING THE DEALERSHIP?</p>

    <div class="type-tabs">
        <button class="type-tab-btn" onclick="selectAdminUserType('admin')" id="type-admin-btn">🛡️ Admin</button>
        <button class="type-tab-btn" onclick="selectAdminUserType('dealer')" id="type-dealer-btn">🏢 Dealer</button>
        <button class="type-tab-btn" onclick="selectAdminUserType('liaison')" id="type-liaison-btn">🤝 Broker</button>
        <button class="type-tab-btn" onclick="selectAdminUserType('client')" id="type-client-btn">👤 Client</button>
    </div>

    <p id="selectedUserTypeDisplay" class="selected-display" style="display:none">
        Selected: <strong id="selectedUserType"></strong>
    </p>

    <input type="password" id="adminKeyInput" placeholder="Enter Access Key" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()" id="loginBtn">Login</button>
    <p id="loginError">Invalid admin key</p>
</div>

<!-- DASHBOARD -->
<div id="dashboardScreen" class="hidden">
    <header>
        <h1>🚗 OmniDrive Admin Dashboard</h1>
        <span id="lastRefresh"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>

    <div class="dashboard">
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="value" id="statTotal">—</div><div class="label">Total Orders</div></div>
            <div class="stat-card green"><div class="value" id="statPaid">—</div><div class="label">Paid</div></div>
            <div class="stat-card"><div class="value" id="statPending">—</div><div class="label">Pending</div></div>
            <div class="stat-card red"><div class="value" id="statFailed">—</div><div class="label">Failed</div></div>
            <div class="stat-card blue"><div class="value" id="statRevenue">—</div><div class="label">Revenue (KES)</div></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTable('orders')">📦 Orders</button>
            <button class="tab-btn" onclick="showTable('dealers')">🏢 Dealers</button>
            <button class="tab-btn" onclick="showTable('vehicles')">🚗 Vehicles</button>
        </div>

        <button class="refresh-btn" onclick="refreshData()">🔄 Refresh Data</button>

        <!-- Orders Table -->
        <div id="ordersSection">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th><th>Date</th><th>Customer</th><th>Vehicle</th><th>Amount</th><th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Dealers Table -->
        <div id="dealersSection" class="hidden">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Dealer</th><th>City</th><th>Vehicles</th><th>Status</th><th>Joined</th>
                        </tr>
                    </thead>
                    <tbody id="dealersTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Vehicles Table -->
        <div id="vehiclesSection" class="hidden">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Brand</th><th>Model</th><th>Price</th><th>Year</th><th>Category</th><th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="vehiclesTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// Current user type
let adminUserType = '';

function selectAdminUserType(type) {
    adminUserType = type;
    
    // Update tab buttons
    ['admin','dealer','broker','client'].forEach(t => {
        const btn = document.getElementById('type-'+t+'-btn');
        btn.classList.toggle('active', t === type);
    });
    
    // Show selection
    document.getElementById('selectedUserTypeDisplay').style.display = 'block';
    document.getElementById('selectedUserType').textContent = type.charAt(0).toUpperCase() + type.slice(1);
    
    // Show login form
    document.getElementById('adminKeyInput').style.display = 'block';
    document.getElementById('loginBtn').style.display = 'block';
    document.getElementById('adminKeyInput').focus();
}

function login() {
    const key = document.getElementById('adminKeyInput').value.trim();
    const expectedKey = '0a6c6a66849b6d29feea4b4381bd4742e7ee226f608468935ad9faa834d8b482';
    
    if (!adminUserType) {
        alert('Please select your user type first!');
        return;
    }
    
    if (key === expectedKey) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboardScreen').classList.remove('hidden');
        document.getElementById('loginError').style.display = 'none';
        loadDashboard();
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
}

function logout() {
    adminUserType = '';
    document.getElementById('dashboardScreen').classList.add('hidden');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminKeyInput').value = '';
    document.getElementById('selectedUserTypeDisplay').style.display = 'none';
    document.getElementById('adminKeyInput').style.display = 'none';
    document.getElementById('loginBtn').style.display = 'none';
    ['admin','dealer','broker','client'].forEach(t => {
        document.getElementById('type-'+t+'-btn').classList.remove('active');
    });
}

function loadDashboard() {
    // Get data from server
    fetch('http://localhost:3000/api/listings')
        .then(r => r.json())
        .then(data => {
            const listings = data.data || [];
            
            // Stats
            document.getElementById('statTotal').textContent = listings.length;
            document.getElementById('statRevenue').textContent = listings.reduce((sum, l) => sum + l.price, 0).toLocaleString();
            
            // Vehicles table
            const tbody = document.getElementById('vehiclesTable');
            tbody.innerHTML = listings.slice(0, 50).map(l => `
                <tr>
                    <td><strong>${l.brand}</strong></td>
                    <td>${l.model}</td>
                    <td>KES ${l.price.toLocaleString()}</td>
                    <td>${l.year}</td>
                    <td>${l.category}</td>
                    <td><span class="badge badge-paid">${l.isActive ? 'Active' : 'Inactive'}</span></td>
                </tr>
            `).join('');
            
            document.getElementById('lastRefresh').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
        })
        .catch(err => console.error('Error loading data:', err));
}

function refreshData() {
    loadDashboard();
    showNotification('Data refreshed!', 'success');
}

function showTable(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    
    document.getElementById('ordersSection').classList.add('hidden');
    document.getElementById('dealersSection').classList.add('hidden');
    document.getElementById('vehiclesSection').classList.add('hidden');
    
    document.getElementById(name + 'Section').classList.remove('hidden');
}

function showNotification(msg, type) {
    // Simple notification
    const div = document.createElement('div');
    div.style.cssText = `
        position: fixed; top: 20px; right: 20px; padding: 15px 25px;
        background: ${type==='success'?'#4caf50':'#f44336'}; color: white;
        border-radius: 8px; z-index: 10000; font-weight: bold;
    `;
    div.textContent = msg;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
}

// Demo data if server not running
setTimeout(() => {
    if (document.getElementById('vehiclesTable').innerHTML === '') {
        document.getElementById('statTotal').textContent = '62';
        document.getElementById('statRevenue').textContent = '38,540,000';
        document.getElementById('vehiclesTable').innerHTML = `
            <tr><td><strong>Tesla</strong></td><td>Model S</td><td>KES 125,000</td><td>2020</td><td>Car</td><td><span class="badge badge-paid">Active</span></td></tr>
            <tr><td><strong>BMW</strong></td><td>M5 Competition</td><td>KES 105,000</td><td>2026</td><td>Car</td><td><span class="badge badge-paid">Active</span></td></tr>
            <tr><td><strong>Ford</strong></td><td>Mustang</td><td>KES 58,000</td><td>2026</td><td>Car</td><td><span class="badge badge-paid">Active</span></td></tr>
        `;
    }
}, 3000);
</script>
</body>
</html>
